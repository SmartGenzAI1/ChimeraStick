set timeout=5
set default=0

# Modern clean boot styling
set color_normal=white/black
set color_highlight=cyan/black

menuentry "ChimeraStick Personal Server" {
    echo "Booting ChimeraStick..."
    linux /vmlinuz-lts modloop=/modloop-lts root=LABEL=BOOT ro quiet console=tty0
    echo "Loading secure initial ramdisk..."
    initrd /initramfs-lts
}

menuentry "ChimeraStick Personal Server (Emergency Console)" {
    echo "Booting into Emergency Console..."
    linux /vmlinuz-lts modloop=/modloop-lts root=LABEL=BOOT ro single console=tty0
    echo "Loading initial ramdisk..."
    initrd /initramfs-lts
}
