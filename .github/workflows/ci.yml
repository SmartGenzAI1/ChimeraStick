name: ChimeraStick CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  python-test:
    name: Python Lint & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/chimera-server/requirements.txt
          pip install flake8 black

      - name: Lint with Flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 src/chimera-server/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings
          flake8 src/chimera-server/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Code Formatting Check (Black)
        run: |
          black --check src/chimera-server/ tests/

      - name: Run Integration Tests
        run: |
          python -m unittest tests/test_app.py

  go-build:
    name: Go Installer Compilation Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Install dependencies
        run: |
          cd src/installer/windows
          go get golang.org/x/sys/windows

      - name: Build Windows Installer (Cross-Compile)
        run: |
          # Create temporary mock payload directory so embed.FS resolves
          mkdir -p src/installer/windows/payload/boot src/installer/windows/payload/efi/EFI/BOOT
          echo "mock" > src/installer/windows/payload/rootfs.squashfs
          echo "mock" > src/installer/windows/payload/boot/grub.cfg
          
          cd src/installer/windows
          GOOS=windows GOARCH=amd64 go build -v -ldflags="-s -w" -o ../../../ChimeraStick2Disk.exe
          
          # Clean up mock payload
          rm -rf payload

  shellcheck:
    name: Shell Script Linter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          ignore: build/  # ignore chroot builds directory
          scandir: 'src'
